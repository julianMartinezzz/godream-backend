
# Definimos que usaremos PostgreSQL
quarkus.datasource.db-kind=postgresql

# Render inyecta automáticamente la URL si usas variables de entorno,
# pero es mejor dejarla lista para recibir el valor.
# Si usas la variable DATABASE_URL de Render, Quarkus la detectará,
# pero aquí definimos la estructura estándar:
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}
quarkus.datasource.username=${DB_USER:postgres}
quarkus.datasource.password=${DB_PASSWORD:password}

# Configuración del Driver JDBC (Esto es lo que pedía el error del log)
quarkus.datasource.jdbc.driver=org.postgresql.Driver

# =============================================================================
# HIBERNATE / JPA
# =============================================================================

# 'update' crea las tablas automáticamente si no existen.
# Para producción en Render, es útil al inicio.
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true

# =============================================================================
# CONFIGURACIÓN DE RED (Importante para Render)
# =============================================================================

# Render necesita que la app escuche en 0.0.0.0
quarkus.http.host=0.0.0.0
quarkus.http.port=8080

# =============================================================================
# ESTRATEGIA DE BUILD
# =============================================================================

# Evita que Quarkus intente levantar una base de datos temporal (Dev Services)
# durante el build de Maven en Docker.
quarkus.devservices.enabled=false

# Requerido para conexiones seguras en Render
quarkus.datasource.jdbc.additional-jdbc-url-params=sslmode=require

# Permitir que cualquier origen (como tu futuro React en Render o Localhost) consulte la API
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000,https://tu-front-en-render.onrender.com
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization